# =============================================================================
# Docker Compose for Tor HTTPS Bridge Proxy with Web UI
# =============================================================================
# Uses Tor running on the host machine (Windows).
# Web dashboard on port 8080, proxy ports 3128/1080.
# =============================================================================

services:
  tor-https-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tor-https-bridge-proxy
    restart: unless-stopped
    ports:
      # Web dashboard
      - "${WEB_PORT:-8080}:8080"
      # HTTPS CONNECT proxy
      - "${HTTPS_PROXY_PORT:-3128}:3128"
      # SOCKS5 proxy
      - "${SOCKS_PROXY_PORT:-1080}:1080"
    environment:
      # Tor on host
      - TOR_BRIDGE_TOR_SOCKS_HOST=host.docker.internal
      - TOR_BRIDGE_TOR_SOCKS_PORT=9050
      # Proxy settings
      - TOR_BRIDGE_HTTPS_PROXY_HOST=0.0.0.0
      - TOR_BRIDGE_HTTPS_PROXY_PORT=3128
      - TOR_BRIDGE_SOCKS_PROXY_HOST=0.0.0.0
      - TOR_BRIDGE_SOCKS_PROXY_PORT=1080
      - TOR_BRIDGE_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TOR_BRIDGE_SANITIZE_HEADERS=${SANITIZE_HEADERS:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tor_network

networks:
  tor_network:
    driver: bridge
