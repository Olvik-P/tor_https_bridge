# =============================================================================
# Docker Compose for Tor HTTPS Bridge Proxy (без встроенного Tor)
# =============================================================================
# Использует Tor, запущенный на хостовой машине (Windows)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Tor HTTPS Bridge Proxy (подключается к внешнему Tor)
  # ---------------------------------------------------------------------------
  tor-https-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tor-https-bridge-proxy
    restart: unless-stopped
    ports:
      # HTTPS CONNECT proxy (внешний порт -> контейнер)
      - "${HTTPS_PROXY_PORT:-3128}:3128"
      # SOCKS5 proxy (внешний порт -> контейнер)
      - "${SOCKS_PROXY_PORT:-1080}:1080"
    environment:
      # Подключаемся к ТОРУ НА ХОСТЕ (не в контейнере!)
      - TOR_BRIDGE_TOR_SOCKS_HOST=host.docker.internal
      - TOR_BRIDGE_TOR_SOCKS_PORT=9050
      # Настройки прокси
      - TOR_BRIDGE_HTTPS_PROXY_HOST=0.0.0.0
      - TOR_BRIDGE_HTTPS_PROXY_PORT=3128
      - TOR_BRIDGE_SOCKS_PROXY_HOST=0.0.0.0
      - TOR_BRIDGE_SOCKS_PROXY_PORT=1080
      - TOR_BRIDGE_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TOR_BRIDGE_SANITIZE_HEADERS=${SANITIZE_HEADERS:-false}
    # Нет depends_on — мы не ждём Tor в контейнере
    extra_hosts:
      # Важно! host.docker.internal работает только в Windows/Mac
      - "host.docker.internal:host-gateway"
    networks:
      - tor_network

networks:
  tor_network:
    driver: bridge